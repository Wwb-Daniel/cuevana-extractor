name: Sincronización Diaria Automática (Series + Películas)

on:
  schedule:
    - cron: '0 0 * * *' # Todos los días a la medianoche UTC (8:00 PM hora local)
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write

jobs:
  daily-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias de Node
        run: |
          npm ci || npm install

      - name: Instalar dependencias del sistema (Xvfb, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Instalar yt-dlp y dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp boto3 curl-cffi
          yt-dlp --version

      - name: Ejecutar Motor de Sincronización Diaria
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SUPABASE_PREMIUM_URL: ${{ secrets.SUPABASE_PREMIUM_URL }}
          SUPABASE_PREMIUM_ANON_KEY: ${{ secrets.SUPABASE_PREMIUM_ANON_KEY }}
        run: |
          # Correr el motor de sincronización bajo Xvfb para Puppeteer headless
          xvfb-run --server-args="-screen 0 1280x1024x24" node daily_sync.js

