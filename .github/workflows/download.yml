name: Descarga de Película y Subida a GitHub Release

on:
  workflow_dispatch:
    inputs:
      movie_url:
        description: 'URL de la película de Cuevana'
        required: true
        type: string
      movie_title:
        description: 'Título de la película (ej. Matrix, Inception)'
        required: false
        type: string
        default: 'pelicula'

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias de Node
        run: npm ci || npm install

      - name: Instalar dependencias del sistema (Xvfb, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Instalar yt-dlp
        run: |
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Instalar dependencias de Python (boto3)
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Iniciar servidor virtual de pantalla (Xvfb) y correr Extractor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Formatear el nombre de archivo de salida de base
          TITLE_CLEAN=$(echo "${{ github.event.inputs.movie_title }}" | sed 's/[^a-zA-Z0-9]/_/g' | tr -s '_')
          FILENAME="${TITLE_CLEAN}.mp4"
          
          # Iniciar Xvfb para que Chrome pueda abrirse con GUI virtual si lo requiere Puppeteer
          xvfb-run --server-args="-screen 0 1280x1024x24" node cuevana_extractor.js "${{ github.event.inputs.movie_url }}" "$FILENAME"

          # Detectar el archivo real final (.mp4) creado en el directorio
          ACTUAL_FILENAME=$(ls *.mp4 | head -n 1)
          if [ -n "$ACTUAL_FILENAME" ]; then
            echo "FILENAME=$ACTUAL_FILENAME" >> $GITHUB_ENV
            echo "Real filename detected: $ACTUAL_FILENAME"
          else
            echo "FILENAME=$FILENAME" >> $GITHUB_ENV
            echo "No mp4 file found, defaulting to: $FILENAME"
          fi

      - name: Subir Película a Cloudflare R2 Storage
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: 'fe39bf665d06666923f48b5763240c4f'
          R2_SECRET_ACCESS_KEY: '8a1e2ff8f0305ce224ef7e8cbb82f4bda97103ffd6a35d99ec7f2ad8853cf7ba'
        run: |
          python upload_to_r2.py "$FILENAME"

      - name: Crear Release y Subir Película (Backup en GitHub)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Crear una etiqueta única basada en la fecha y hora
          TAG_NAME="download-$(date +'%Y%m%d-%H%M%S')"
          RELEASE_TITLE="${{ github.event.inputs.movie_title }} ($(date +'%Y-%m-%d %H:%M'))"
          
          echo "Creando Release $TAG_NAME con título '$RELEASE_TITLE'..."
          gh release create "$TAG_NAME" \
            --title "$RELEASE_TITLE" \
            --notes "Descarga automatizada de Cuevana realizada el $(date +'%Y-%m-%d %H:%M:%S')."
          
          echo "Subiendo archivo(s) .mp4 al release..."
          # Subir todos los archivos .mp4 que se encuentren en la raíz del proyecto
          gh release upload "$TAG_NAME" *.mp4
          
          echo "¡Completado! Puedes descargar tu película en la pestaña 'Releases' de tu repositorio."
